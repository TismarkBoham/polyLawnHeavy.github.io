function rangeScore(value, lo, hi, step) {
  var gap = value < lo ? lo - value : value > hi ? value - hi : 0;
  return gap === 0 ? 100 : gap <= step ? 78 : gap <= step * 2 ? 55 : gap <= step * 3.5 ? 32 : 12;
}

// Soil nutrients (CEC) score asymmetrically: within the ideal range is a
// perfect score either way, but the two directions of "off-range" mean
// different things biologically. Too little CEC is a real limiting
// factor (poor nutrient/water holding, plant genuinely struggles) so it's
// penalised steeply. Too much CEC just means richer-than-needed soil,
// which rarely hurts these species, so it's penalised gently.
function cecScore(value, lo, hi) {
  if (value >= lo && value <= hi) return 100;
  if (value > hi) {
    var over = value - hi;
    return over <= 6 ? 88 : over <= 12 ? 76 : over <= 24 ? 65 : 55;
  }
  var under = lo - value;
  return under <= 4 ? 55 : under <= 8 ? 35 : under <= 14 ? 18 : 8;
}

function shadeScore(shadePct, tol) {
  if (shadePct < 10) return 70; // full sun: shade tolerance isn't a differentiator
  var frac = Math.min(1, shadePct / 100);
  return Math.round(Math.min(100, (tol / 10) * 100 * (0.35 + frac * 0.65)));
}

function siScore(site, p) {
  var rain = rangeScore(site.rain, p.rainLo, p.rainHi, 2);
  var gdd  = site.gdd != null ? rangeScore(site.gdd, p.gddLo, p.gddHi, 500) : 60;
  var ph   = site.ph  != null ? rangeScore(site.ph,  p.phLo,  p.phHi,  0.4) : 60;
  var cec  = site.cec != null ? cecScore(site.cec, p.cecLo, p.cecHi)   : 60;
  var shade = shadeScore(site.shadePct, p.shadeTol);
  var subs = { rain: rain, gdd: gdd, ph: ph, cec: cec, shade: shade };
  var total = Math.round((rain + gdd + ph + cec + shade) / 5);
  return { total: total, subs: subs };
}

// ── Progress bar ──────────────────────────────────────────────────
var progress = 0;
function setProgress(pct, label) {
  progress = Math.max(progress, pct);
  document.getElementById('progress-fill').style.width = progress + '%';
  document.getElementById('progress-label').textContent = label + ' (' + progress + '%)';
}

// ── Geocoding ─────────────────────────────────────────────────────
async function geocode(addr) {
  var r = await fetch('https://photon.komoot.io/api/?q=' + encodeURIComponent(addr) + '&limit=1&lang=en');
  var d = await r.json();
  if (!d.features || !d.features.length) return null;
  var f = d.features[0], p = f.properties;
  return {
    lat: f.geometry.coordinates[1], lon: f.geometry.coordinates[0],
    name: [p.name, p.city || p.county, p.state, p.country].filter(Boolean).join(', ')
  };
}

// ── Climate: summer rainfall + growing degree days (base 50°F) ──────
async function fetchClimate(lat, lon) {
  var url = 'https://archive-api.open-meteo.com/v1/archive'
    + '?latitude=' + lat.toFixed(4) + '&longitude=' + lon.toFixed(4)
    + '&start_date=2019-01-01&end_date=2023-12-31'
    + '&daily=precipitation_sum,temperature_2m_max,temperature_2m_min'
    + '&temperature_unit=fahrenheit&timezone=auto';
  var r = await fetch(url);
  var j = await r.json();
  if (!j.daily || !j.daily.time) return null;

  var byYear = {}; // { year: { summerPrecipMm, gdd } }
  j.daily.time.forEach(function (t, i) {
    var y = t.slice(0, 4), m = parseInt(t.slice(5, 7));
    if (!byYear[y]) byYear[y] = { summerMm: 0, gdd: 0 };
    if (m >= 6 && m <= 8) byYear[y].summerMm += (j.daily.precipitation_sum[i] || 0);
    var tmax = j.daily.temperature_2m_max[i], tmin = j.daily.temperature_2m_min[i];
    if (tmax != null && tmin != null) {
      byYear[y].gdd += Math.max(0, (tmax + tmin) / 2 - 50);
    }
  });
  var years = Object.keys(byYear);
  var avgSummerIn = years.reduce(function (s, y) { return s + byYear[y].summerMm; }, 0) / years.length / 25.4;
  var avgGdd = years.reduce(function (s, y) { return s + byYear[y].gdd; }, 0) / years.length;
  return { summerPrecipIn: avgSummerIn, gdd: Math.round(avgGdd) };
}

// ── Soil: pH + nutrients (CEC), nearest available point ─────────────
// SoilGrids v2.0 masks out water, glaciers, and built-up/urban land, so a
// geocoded street address almost always lands on a masked pixel. All
// candidate points (the address + expanding rings) are queried in one
// parallel batch so the whole search resolves in roughly one round trip.
async function soilAt(lat, lon, timeoutMs) {
  var ctrl = new AbortController();
  var t = setTimeout(function () { ctrl.abort(); }, timeoutMs);
  try {
    var url = 'https://rest.isric.org/soilgrids/v2.0/properties/query'
      + '?lon=' + lon.toFixed(5) + '&lat=' + lat.toFixed(5)
      + '&property=phh2o&property=cec&depth=0-5cm&value=mean';
    var r = await fetch(url, { signal: ctrl.signal });
    clearTimeout(t);
    if (!r.ok) return null;
    var j = await r.json();
    var layers = j && j.properties && j.properties.layers;
    if (!layers) return null;
    var phLayer  = layers.find(function (l) { return l.name === 'phh2o'; });
    var cecLayer = layers.find(function (l) { return l.name === 'cec'; });
    var phRaw  = phLayer  && phLayer.depths[0]  && phLayer.depths[0].values.mean;
    var cecRaw = cecLayer && cecLayer.depths[0] && cecLayer.depths[0].values.mean;
    if (phRaw == null) return null;
    return { ph: phRaw / 10, cec: cecRaw != null ? cecRaw / 10 : null };
  } catch (e) { clearTimeout(t); return null; }
}

function ringPoints(lat, lon, radiusM) {
  var mLa = 111000, mLo = 111000 * Math.cos(lat * Math.PI / 180);
  var pts = [];
  for (var i = 0; i < 8; i++) {
    var ang = (i / 8) * 2 * Math.PI;
    pts.push({
      lat: lat + Math.cos(ang) * radiusM / mLa,
      lon: lon + Math.sin(ang) * radiusM / mLo,
      dist: radiusM
    });
  }
  return pts;
}

async function fetchSoil(lat, lon) {
  var candidates = [{ lat: lat, lon: lon, dist: 0 }]
    .concat(ringPoints(lat, lon, 400))
    .concat(ringPoints(lat, lon, 1200))
    .concat(ringPoints(lat, lon, 3000))
    .concat(ringPoints(lat, lon, 5000));

  var timeoutMs = 6000;
  var vals = await Promise.all(candidates.map(function (c) { return soilAt(c.lat, c.lon, timeoutMs); }));

  var best = null, bestDist = Infinity;
  for (var i = 0; i < vals.length; i++) {
    if (vals[i] != null && candidates[i].dist < bestDist) { best = vals[i]; bestDist = candidates[i].dist; }
  }
  return best != null ? { ph: best.ph, cec: best.cec, offsetM: bestDist } : null;
}

// ── Main ──────────────────────────────────────────────────────────
async function run() {
  var addr = document.getElementById('address').value.trim();
  var shadePct = Math.max(0, Math.min(100, parseInt(document.getElementById('shade').value) || 0));
  var btn = document.getElementById('btn');
  var status = document.getElementById('status');
  var out = document.getElementById('out');
  var progressWrap = document.getElementById('progress-wrap');

  out.style.display = 'none';
  status.textContent = '';
  progress = 0;
  progressWrap.style.display = 'block';
  setProgress(0, 'Starting');

  if (!addr) { status.textContent = 'Enter an address.'; progressWrap.style.display = 'none'; return; }

  btn.disabled = true; btn.textContent = 'Checking…';

  try {
    setProgress(10, 'Geocoding address');
    var geo = await geocode(addr);
    if (!geo) throw new Error('Address not found.');
    setProgress(25, 'Address located');

    setProgress(30, 'Fetching climate and soil data');
    var results = await Promise.all([
      fetchClimate(geo.lat, geo.lon).then(function (r) { setProgress(70, 'Climate data received'); return r; }),
      fetchSoil(geo.lat, geo.lon).then(function (r) { setProgress(85, 'Soil data received'); return r; })
    ]);
    var climate = results[0];
    var soil = results[1];
    if (!climate) throw new Error('Climate data unavailable.');

    setProgress(92, 'Scoring 15 species');
    var site = {
      rain: climate.summerPrecipIn,
      gdd: climate.gdd,
      ph: soil ? soil.ph : null,
      cec: soil ? soil.cec : null,
      shadePct: shadePct
    };

    var ranked = PLANTS.map(function (p) {
      var s = siScore(site, p);
      return { plant: p, si: s.total, subs: s.subs };
    }).sort(function (a, b) { return b.si - a.si; });

    setProgress(100, 'Done');

    document.getElementById('loc').textContent =
      geo.name
      + ' — summer rain: ' + site.rain.toFixed(1) + '"'
      + ' · GDD50: ' + site.gdd
      + (site.ph != null ? ' · soil pH: ' + site.ph.toFixed(1) : ' · soil pH: no data')
      + (site.cec != null ? ' · CEC: ' + site.cec.toFixed(1) + ' cmol/kg' : '')
      + (soil && soil.offsetM > 0 ? ' (nearest soil data ~' + soil.offsetM + 'm away)' : '')
      + ' · shade: ' + shadePct + '%';

    var tagClass = { Grass: 'tag-grass', Flower: 'tag-flower', Crop: 'tag-crop' };
    var VAR_META = {
      rain:  { label: 'Summer rain',    unit: '"',       fmt: function (v) { return v.toFixed(1); } },
      gdd:   { label: 'Growing degree days', unit: '',   fmt: function (v) { return Math.round(v); } },
      ph:    { label: 'Soil pH',        unit: '',        fmt: function (v) { return v.toFixed(1); } },
      cec:   { label: 'Soil nutrients (CEC)', unit: ' cmol/kg', fmt: function (v) { return v.toFixed(1); } },
      shade: { label: 'Shade cover',    unit: '%',       fmt: function (v) { return Math.round(v); } },
    };
    var VAR_RANGE_KEYS = { rain: ['rainLo', 'rainHi'], gdd: ['gddLo', 'gddHi'], ph: ['phLo', 'phHi'], cec: ['cecLo', 'cecHi'] };
    var siteVals = { rain: site.rain, gdd: site.gdd, ph: site.ph, cec: site.cec, shade: site.shadePct };

    function scoreColor(s) { return s >= 70 ? '#2d7a4f' : s >= 45 ? '#c25a00' : '#b91c1c'; }

    document.getElementById('cards').innerHTML = ranked.map(function (r, i) {
      var subs = r.subs;
      var lowest = Object.keys(subs).sort(function (a, b) { return subs[a] - subs[b]; }).slice(0, 2);
      var labelMap = { rain: 'rain', gdd: 'temperature', ph: 'pH', cec: 'nutrients', shade: 'shade' };
      var why = lowest.map(function (k) { return labelMap[k] + ' (' + subs[k] + ')'; }).join(', ');
      var cardId = 'card-' + i;

      var detailRows = Object.keys(subs).map(function (k) {
        var meta = VAR_META[k];
        var siteVal = siteVals[k];
        var siteStr = siteVal != null ? meta.fmt(siteVal) + meta.unit : 'no data';
        var rangeStr = k === 'shade'
          ? 'tolerance ' + r.plant.shadeTol + '/10'
          : (r.plant[VAR_RANGE_KEYS[k][0]] + '–' + r.plant[VAR_RANGE_KEYS[k][1]] + meta.unit + ' ideal');
        var s = subs[k];
        return '<div class="detail-row">'
          + '<span class="detail-label">' + meta.label + '<span class="detail-val">site: ' + siteStr + ' · ' + rangeStr + '</span></span>'
          + '<span class="detail-bar-wrap"><span class="detail-bar" style="width:' + s + '%;background:' + scoreColor(s) + '"></span></span>'
          + '<span class="detail-score" style="color:' + scoreColor(s) + '">' + s + '</span>'
          + '</div>';
      }).join('');

      return '<div class="card' + (i === 0 ? ' rank1' : '') + '" onclick="toggleDetail(event, \'' + cardId + '\')">'
        + '<span class="score">' + r.si + '</span>'
        + '<div><span class="name">#' + (i + 1) + ' ' + r.plant.name + '</span>'
        + '<span class="tag ' + tagClass[r.plant.cat] + '">' + r.plant.cat + '</span></div>'
        + '<div class="sub">' + r.plant.type + '</div>'
        + '<div class="why">Limiting factors: ' + why + '</div>'
        + '<div class="expand-hint">Click for full score breakdown ▾</div>'
        + '<div class="detail" id="' + cardId + '">' + detailRows + '</div>'
        + '</div>';
    }).join('');

    out.style.display = 'block';
  } catch (e) {
    status.textContent = e.message;
  }
  btn.disabled = false; btn.textContent = 'Check';
}

function toggleDetail(evt, id) {
  evt.stopPropagation();
  var el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

document.getElementById('address').addEventListener('keydown', function (e) { if (e.key === 'Enter') run(); });
